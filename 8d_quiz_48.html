<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8维能力测评 | Santa Chow</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #1e3a8a;
            --primary-light: #3b82f6;
            --secondary: #475569;
            --accent: #f59e0b;
            --dark: #0f172a;
            --light: #f8fafc;
            --success: #10b981;
            --gray-200: #e2e8f0;
            --gray-400: #94a3b8;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft YaHei", "Noto Sans SC", "PingFang SC", sans-serif;
            background: var(--dark);
            min-height: 100vh;
            overflow-x: hidden;
        }
        .hero-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; z-index: 0; overflow: hidden; }
        .hero-bg::before {
            content: '';
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(15,23,42,0.2) 0%, rgba(15,23,42,0.4) 30%, rgba(15,23,42,0.7) 70%, rgba(15,23,42,0.95) 100%),
                url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1920&q=80') center/cover;
            animation: slowZoom 45s ease-in-out infinite alternate;
        }
        @keyframes slowZoom { from { transform: scale(1); } to { transform: scale(1.1); } }
        .city-silhouette {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 25%;
            background: linear-gradient(to top, rgba(15,23,42,0.3) 0%, transparent 100%);
            pointer-events: none;
        }
        .main-container { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
        .logo-section { text-align: center; margin-bottom: 40px; animation: fadeInDown 0.8s ease-out; }
        .logo { font-size: 14px; letter-spacing: 4px; color: var(--accent); font-weight: 600; }
        .logo-section h1 { font-size: 36px; color: white; margin-top: 10px; font-weight: 700; letter-spacing: 2px; }
        .logo-section p { color: var(--gray-400); margin-top: 8px; font-size: 15px; }
        .tagline { color: var(--accent); font-size: 18px; font-weight: 500; margin-top: 6px; }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .card { max-width: 720px; width: 100%; background: rgba(255,255,255,0.97); border-radius: 20px; padding: 40px; backdrop-filter: blur(20px); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); animation: fadeInUp 0.6s ease-out; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none !important; }

        /* Info Section */
        .info-title { font-size: 22px; font-weight: 700; color: var(--dark); margin-bottom: 8px; }
        .info-subtitle { font-size: 14px; color: var(--gray-400); margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 14px; font-weight: 600; color: var(--secondary); margin-bottom: 6px; }
        .form-group input, .form-group select {
            width: 100%; padding: 14px 16px; border: 2px solid var(--gray-200); border-radius: 12px;
            font-size: 15px; transition: border-color 0.2s; background: white;
        }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--primary); }

        /* Progress */
        .progress-container { display: flex; align-items: center; gap: 16px; margin-bottom: 30px; }
        .progress-bar { flex: 1; height: 8px; background: var(--gray-200); border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--primary-light)); border-radius: 4px; transition: width 0.4s ease; }
        .progress-text { font-size: 13px; color: var(--gray-400); font-weight: 600; min-width: 60px; text-align: right; }

        /* Question */
        .question-card { background: var(--light); border-radius: 16px; padding: 24px; margin-bottom: 24px; }
        .question-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .question-dimension { font-size: 12px; color: var(--primary); background: rgba(30,58,138,0.1); padding: 4px 12px; border-radius: 20px; font-weight: 600; }
        .question-number { font-size: 12px; color: var(--gray-400); }
        .question-text { font-size: 17px; font-weight: 500; color: var(--dark); line-height: 1.6; margin-bottom: 20px; }

        /* Options */
        .options-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .option { position: relative; }
        .option input { position: absolute; opacity: 0; }
        .option label {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            padding: 12px 4px; background: white; border: 2px solid var(--gray-200);
            border-radius: 12px; cursor: pointer; transition: all 0.2s;
        }
        .option label:hover { border-color: var(--primary-light); background: #f0f4ff; }
        .option input:checked + label { border-color: var(--primary); background: #eef2ff; box-shadow: 0 0 0 3px rgba(30,58,138,0.15); }
        .option .opt-num { font-size: 16px; font-weight: 700; color: var(--primary); }
        .option .opt-label { font-size: 10px; color: var(--gray-400); text-align: center; line-height: 1.3; }

        /* Buttons */
        .nav-buttons { display: flex; justify-content: space-between; gap: 12px; margin-top: 8px; }
        .btn {
            padding: 14px 32px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600;
            cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-light); transform: translateY(-2px); }
        .btn-secondary { background: white; color: var(--secondary); border: 2px solid var(--gray-200); }
        .btn-secondary:hover { border-color: var(--gray-400); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        /* ============================== */
        /*  RESULT SECTION — REDESIGNED  */
        /* ============================== */
        .result-header { text-align: center; padding: 10px 0 20px; }
        .result-header h2 { font-size: 28px; color: var(--dark); }
        .result-header p { color: var(--gray-400); margin-top: 8px; font-size: 13px; }
        .result-badges { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin: 12px 0; }
        .result-badge { padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .result-badge.high { background: #d1fae5; color: #065f46; }
        .result-badge.mid { background: #dbeafe; color: #1e40af; }
        .result-badge.low { background: #fff7ed; color: #9a3412; }
        .result-btn-group { display: flex; gap: 10px; justify-content: center; margin-top: 16px; flex-wrap: wrap; }

        /* Radar chart — SVG inline */
        .radar-container { display: flex; justify-content: center; margin: 10px 0 20px; }
        .radar-container svg { max-width: 100%; height: auto; }

        /* Score grid — redesigned */
        .score-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 16px 0; }
        .score-card { background: var(--light); border-radius: 12px; padding: 14px; text-align: center; position: relative; overflow: hidden; }
        .score-card .icon { font-size: 22px; }
        .score-card .dim-name { font-size: 12px; color: var(--secondary); margin: 4px 0 2px; }
        .score-card .dim-score { font-size: 22px; font-weight: 700; margin: 4px 0; }
        .score-card .dim-level { font-size: 11px; }
        .score-card .mini-bar { height: 3px; border-radius: 2px; margin-top: 6px; transition: width 1s ease; }

        /* Report sections */
        .report-section { margin: 16px 0; }
        .report-section h3 { font-size: 16px; font-weight: 700; color: var(--primary); margin-bottom: 10px;
            padding-bottom: 8px; border-bottom: 2px solid var(--gray-200);
            display: flex; align-items: center; gap: 8px; }
        .report-section ul { list-style: none; padding: 0; }
        .report-section li { padding: 6px 0; font-size: 13px; color: var(--secondary); line-height: 1.5; padding-left: 18px; position: relative; }
        .report-section li::before { content: '▸'; position: absolute; left: 0; color: var(--primary-light); }

        /* Strength/Development cards */
        .strength-card {
            background: linear-gradient(135deg, #f0fdf4, #ecfdf5);
            border-radius: 14px; padding: 16px; margin-bottom: 10px;
            border-left: 4px solid #10b981;
            transition: transform 0.2s;
        }
        .strength-card:hover { transform: translateX(3px); }
        .strength-card .card-header {
            display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
        }
        .strength-card .card-header .dim-icon { font-size: 20px; }
        .strength-card .card-header .dim-label { font-size: 15px; font-weight: 700; }
        .strength-card .card-header .score-tag {
            margin-left: auto; color: white; border-radius: 20px;
            padding: 2px 12px; font-size: 13px; font-weight: 700;
        }
        .strength-card .card-desc { font-size: 13px; color: var(--secondary); margin-bottom: 8px; line-height: 1.5; }
        .strength-card .card-traits { font-size: 12px; color: var(--gray-400); padding-left: 16px; }

        .dev-card {
            background: linear-gradient(135deg, #fffbeb, #fef3c7);
            border-radius: 14px; padding: 16px; margin-bottom: 10px;
            border-left: 4px solid #f59e0b;
            transition: transform 0.2s;
        }
        .dev-card:hover { transform: translateX(3px); }
        .dev-card .card-header {
            display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
        }
        .dev-card .card-header .dim-icon { font-size: 20px; }
        .dev-card .card-header .dim-label { font-size: 15px; font-weight: 700; }
        .dev-card .card-header .score-tag {
            margin-left: auto; border-radius: 20px; padding: 2px 12px;
            font-size: 13px; font-weight: 700; color: white;
        }
        .dev-card .card-desc { font-size: 13px; color: var(--secondary); margin-bottom: 10px; line-height: 1.5; }
        .dev-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .dev-grid-2 h4 { font-size: 11px; font-weight: 700; color: var(--gray-400); margin-bottom: 4px; }
        .dev-grid-2 ul { font-size: 12px; color: var(--secondary); padding-left: 14px; }
        .dev-grid-2 li { margin-bottom: 2px; }

        /* Sub-ability insight blocks */
        .insight-block {
            background: linear-gradient(135deg, #f8fafc, #f1f5f9);
            border-radius: 14px; padding: 16px; margin: 8px 0;
            transition: box-shadow 0.2s;
        }
        .insight-block:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .insight-block .header-row {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
        }
        .insight-block .header-row .dim-label { font-size: 14px; font-weight: 700; }
        .insight-block .header-row .total-score { font-size: 18px; font-weight: 700; }
        .insight-block .sub-flex { display: flex; flex-wrap: wrap; gap: 10px; }
        .insight-block .sub-item {
            flex: 1; min-width: 100px; background: white; border-radius: 10px;
            padding: 10px; text-align: center;
        }
        .insight-block .sub-item .name { font-size: 11px; font-weight: 700; margin-bottom: 3px; }
        .insight-block .sub-item .score { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
        .insight-block .sub-item .mini-bar-bg { height: 4px; background: var(--gray-200); border-radius: 2px; overflow: hidden; margin-bottom: 5px; }
        .insight-block .sub-item .mini-bar-fill { height: 100%; border-radius: 2px; transition: width 1s ease; }
        .insight-block .sub-item .desc { font-size: 10px; color: var(--gray-400); line-height: 1.3; }

        /* Action plan */
        .action-item {
            display: flex; align-items: flex-start; gap: 10px;
            padding: 12px; border-radius: 12px; margin-bottom: 6px;
        }
        .action-item .icon { font-size: 16px; flex-shrink: 0; margin-top: 2px; }
        .action-item .content .title { font-size: 12px; font-weight: 700; margin-bottom: 2px; }
        .action-item .content .desc { font-size: 12px; color: var(--gray-400); }

        /* Disclaimer */
        .disclaimer {
            margin-top: 20px; padding: 14px; background: #fffbeb;
            border-radius: 14px; font-size: 12px; color: #92400e;
            border-left: 4px solid #f59e0b; line-height: 1.5;
        }

        /* Loading spinner */
        .loading { text-align: center; padding: 60px 20px; }
        .loading-spinner { width: 48px; height: 48px; border: 4px solid var(--gray-200); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeInUp 0.5s ease-out; }

        /* ========================================== */
        /*  PRINT-TO-PDF STYLES — Hidden on screen    */
        /* ========================================== */
        #printArea {
            display: none;
            width: 100%;
            background: #ffffff;
            font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", "Source Han Sans CN", sans-serif;
        }
        #printArea .print-page {
            max-width: 800px;
            margin: 0 auto;
            padding: 24px 32px;
            color: #1a1a1a;
            font-size: 12pt;
            line-height: 1.6;
        }
        #printArea .print-header {
            border-bottom: 3px solid #1e3a8a;
            padding-bottom: 16px;
            margin-bottom: 20px;
        }
        #printArea .print-header h1 {
            font-size: 22pt;
            color: #1e3a8a;
            margin: 0 0 4px;
        }
        #printArea .print-header .subtitle {
            font-size: 10pt;
            color: #666;
        }
        #printArea .print-section-title {
            font-size: 13pt;
            color: #1e3a8a;
            border-bottom: 1.5px solid #cbd5e1;
            padding-bottom: 6px;
            margin: 20px 0 10px;
        }
        #printArea .print-score-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }
        #printArea .print-score-card {
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 10px 8px;
            text-align: center;
        }
        #printArea .print-score-card .icon { font-size: 18pt; }
        #printArea .print-score-card .dim-name { font-size: 9pt; color: #64748b; margin: 2px 0; }
        #printArea .print-score-card .score { font-size: 16pt; font-weight: bold; }
        #printArea .print-card-list { margin-bottom: 14px; }
        #printArea .print-card {
            border-radius: 8px;
            padding: 12px 14px;
            margin-bottom: 10px;
            border-left: 4px solid;
        }
        #printArea .print-card.strength { background: #f0fdf4; border-left-color: #10b981; }
        #printArea .print-card.development { background: #fffbeb; border-left-color: #f59e0b; }
        #printArea .print-card-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }
        #printArea .print-card-header .label { font-size: 12pt; font-weight: bold; }
        #printArea .print-card-header .score { font-size: 11pt; font-weight: bold; padding: 1px 8px; border-radius: 12px; color: white; margin-left: auto; }
        #printArea .print-card-desc { font-size: 10pt; color: #475569; margin-bottom: 4px; }
        #printArea .print-card-traits { font-size: 10pt; color: #64748b; padding-left: 16px; margin: 0; }
        #printArea .print-card-traits li { margin-bottom: 2px; }
        #printArea .print-dev-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        #printArea .print-dev-grid h4 { font-size: 9pt; color: #94a3b8; margin: 0 0 4px; }
        #printArea .print-dev-grid ul { font-size: 10pt; color: #475569; margin: 0; padding-left: 14px; }
        #printArea .print-dev-grid li { margin-bottom: 2px; }
        #printArea .print-sub-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }
        #printArea .print-sub-item {
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 8px;
            text-align: center;
        }
        #printArea .print-sub-item .name { font-size: 10pt; font-weight: bold; color: #1e3a8a; margin-bottom: 2px; }
        #printArea .print-sub-item .score { font-size: 14pt; font-weight: bold; }
        #printArea .print-sub-item .desc { font-size: 8pt; color: #94a3b8; margin-top: 2px; line-height: 1.3; }
        #printArea .print-action-item {
            display: flex;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 8px;
            margin-bottom: 6px;
        }
        #printArea .print-action-item .dot { font-size: 12pt; }
        #printArea .print-action-item .title { font-size: 10pt; font-weight: bold; }
        #printArea .print-action-item .action { font-size: 10pt; color: #64748b; }
        #printArea .print-disclaimer {
            margin-top: 20px;
            padding: 10px 14px;
            background: #fffbeb;
            border-radius: 8px;
            border-left: 4px solid #f59e0b;
            font-size: 9pt;
            color: #92400e;
        }
        #printArea .print-footer {
            margin-top: 24px;
            padding-top: 10px;
            border-top: 1px solid #e2e8f0;
            text-align: center;
            font-size: 9pt;
            color: #94a3b8;
        }
        #printArea .page-break { page-break-before: always; }
        #printArea .strength .score { background: #059669; }
        #printArea .development .score { background: #ea580c; }
        #printArea .action-priority { background: #fffbeb; }
        #printArea .action-maintain { background: #f0fdf4; }

        /* Persona 人格画像卡 */
        .persona-card {
            background: linear-gradient(135deg, #eef2ff, #e0e7ff);
            border-radius: 16px;
            padding: 20px;
            margin: 10px 0 20px;
            border: 2px solid #c7d2fe;
            text-align: center;
        }
        .persona-card .persona-name {
            font-size: 22px;
            font-weight: 800;
            color: #1e3a8a;
            margin-bottom: 4px;
        }
        .persona-card .persona-metaphor {
            font-size: 15px;
            color: #4338ca;
            margin-bottom: 10px;
        }
        .persona-card .persona-meta {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            font-size: 13px;
            color: #3730a3;
        }
        .persona-card .persona-meta span {
            background: white;
            padding: 4px 14px;
            border-radius: 20px;
            border: 1px solid #c7d2fe;
        }

        /* 张力分析卡 */
        .tension-card {
            background: linear-gradient(135deg, #fef2f2, #fee2e2);
            border-radius: 14px;
            padding: 18px;
            margin: 12px 0;
            border-left: 4px solid #ef4444;
        }
        .tension-card .tension-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .tension-card .tension-header .dim-badge {
            font-size: 12px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 12px;
            color: white;
        }
        .tension-card .tension-header .vs { font-size: 12px; color: #94a3b8; font-weight: 600; }
        .tension-card .tension-conflict {
            font-size: 14px;
            color: #7f1d1d;
            line-height: 1.6;
            margin-bottom: 12px;
            padding: 10px;
            background: rgba(255,255,255,0.6);
            border-radius: 10px;
        }
        .tension-card .tension-scenario-title {
            font-size: 13px;
            font-weight: 700;
            color: #991b1b;
            margin-bottom: 4px;
        }
        .tension-card .tension-inner-os {
            font-size: 12px;
            color: #92400e;
            background: #fffbeb;
            padding: 8px 12px;
            border-radius: 8px;
            margin: 6px 0;
            font-style: italic;
        }
        .tension-card .tension-analysis {
            font-size: 12px;
            color: #7f1d1d;
            line-height: 1.5;
        }
        .tension-card .tension-footer {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .tension-card .tension-landmine {
            flex: 1;
            background: #fef2f2;
            border-radius: 8px;
            padding: 8px 10px;
            font-size: 12px;
        }
        .tension-card .tension-landmine .label { color: #dc2626; font-weight: 700; }
        .tension-card .tension-prevention {
            flex: 1;
            background: #f0fdf4;
            border-radius: 8px;
            padding: 8px 10px;
            font-size: 12px;
        }
        .tension-card .tension-prevention .label { color: #16a34a; font-weight: 700; }

        /* 寄语卡 */
        .closing-card {
            margin-top: 20px;
            padding: 18px;
            border-radius: 14px;
            line-height: 1.7;
            font-size: 14px;
        }
        .closing-card.tone-celebrate { background: linear-gradient(135deg, #ecfdf5, #d1fae5); color: #065f46; }
        .closing-card.tone-encourage { background: linear-gradient(135deg, #eef2ff, #dbeafe); color: #1e40af; }
        .closing-card.tone-support { background: linear-gradient(135deg, #fffbeb, #fef3c7); color: #92400e; }

        /* ========================================== */
        /*  @media print — hide screen UI completely  */
        /* ========================================== */
        @media print {
            @page {
                size: A4;
                margin: 15mm 15mm 15mm 15mm;
            }
            html, body {
                background: #ffffff !important;
                color: #000 !important;
                font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", "Source Han Sans CN", sans-serif !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            /* Hide all screen elements */
            .hero-bg, .city-silhouette, .main-container, .logo-section,
            #infoSection, #quizSection, .footer,
            #resultSection > .result-header,
            #resultSection .result-header h2,
            #resultSection .result-header p,
            #resultSection .result-header button,
            #resultSection .result-badges,
            #resultSection .score-grid,
            #resultSection .report-section > h3,
            #resultSection .strength-card,
            #resultSection .dev-card,

            { id: 44, dim: 'LLA', text: '我关注行业最新动态并主动学习新知识。' },
            { id: 45, dim: 'LLA', text: '我会主动探索本职以外的新领域。' },
            { id: 46, dim: 'LLA', text: '我经常因为好奇心学习一些暂时用不到的东西。' },
            { id: 47, dim: 'LLA', text: '遇到失败时，我会反思并从中提炼教训。' },
            { id: 48, dim: 'LLA', text: '批评意见对我而言是成长机会而非打击。' }
        ];

        const OPTIONS = [
            { val: 1, label: '非常不同意', short: '不同意' },
            { val: 2, label: '不同意', short: '' },
            { val: 3, label: '普通', short: '普通' },
            { val: 4, label: '同意', short: '' },
            { val: 5, label: '非常同意', short: '同意' }
        ];

        let currentQ = 0;
        let answers = {};
        let order = [];
        let resultId = null;

        // Shuffle
        function shuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function startQuiz() {
            const exp = document.getElementById('experience').value;
            if (!exp) { alert('请选择工作经验'); return; }
            // Build order: shuffle each dimension's questions to keep dimension grouping
            const dims = ['COG','TEC','COM','SOC','ORG','PRS','MGT','LLA'];
            order = [];
            for (const dim of dims) {
                const dimQs = questions.filter(q => q.dim === dim);
                order.push(...shuffle(dimQs));
            }
            // Validation check: randomly insert 1 attention-check
            // Actually just proceed
            currentQ = 0;
            answers = {};
            document.getElementById('infoSection').classList.add('hidden');
            document.getElementById('quizSection').classList.remove('hidden');
            renderQuestion();
        }

        function renderQuestion() {
            const q = order[currentQ];
            const total = order.length;
            const pct = ((currentQ + 1) / total * 100).toFixed(0);
            document.getElementById('progressFill').style.width = pct + '%';
            document.getElementById('progressText').textContent = `${currentQ+1} / ${total}`;
            document.getElementById('prevBtn').disabled = currentQ === 0;

            const dimInfo = DIM_INFO[q.dim];
            const nextLabel = currentQ === total - 1 ? '提交评测 ✓' : '下一题 →';

            let optHtml = OPTIONS.map((o, i) => {
                const checked = answers[q.id] === o.val ? 'checked' : '';
                return `<div class="option">
                    <input type="radio" name="ans" id="opt${i}" value="${o.val}" ${checked}>
                    <label for="opt${i}">
                        <span class="opt-num">${o.val}</span>
                        <span class="opt-label">${o.label}</span>
                    </label>
                </div>`;
            }).join('');

            document.getElementById('nextBtn').innerHTML = nextLabel;
            document.getElementById('questionContainer').innerHTML = `
                <div class="question-card">
                    <div class="question-meta">
                        <span class="question-dimension" style="background:${dimInfo.color}22;color:${dimInfo.color}">${dimInfo.icon} ${dimInfo.name}</span>
                        <span class="question-number">第 ${currentQ+1} / ${total} 题</span>
                    </div>
                    <div class="question-text">${q.text}</div>
                    <div class="options-grid">${optHtml}</div>
                </div>`;
        }

        function nextQuestion() {
            const selected = document.querySelector('input[name="ans"]:checked');
            if (!selected) { alert('请选择一个选项'); return; }
            answers[order[currentQ].id] = parseInt(selected.value);
            if (currentQ < order.length - 1) {
                currentQ++;
                renderQuestion();
            } else {
                submitQuiz();
            }
        }

        function prevQuestion() {
            const selected = document.querySelector('input[name="ans"]:checked');
            if (selected) answers[order[currentQ].id] = parseInt(selected.value);
            if (currentQ > 0) { currentQ--; renderQuestion(); }
        }

        async function submitQuiz() {
            document.getElementById('quizSection').classList.add('hidden');
            document.getElementById('resultSection').classList.remove('hidden');
            document.getElementById('resultContent').innerHTML = '<div class="loading"><div class="loading-spinner"></div><p>正在计算评测结果...</p></div>';

            const name = document.getElementById('userName').value || '匿名用户';
            const exp = document.getElementById('experience').value;
            const ind = document.getElementById('industry').value;

            try {
                const res = await fetch('/api/quiz/submit_48', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name, experience: exp, industry: ind,
                        answers, question_order: order.map(q => q.id)
                    })
                });

                if (!res.ok) {
                    const err = await res.json();
                    document.getElementById('resultContent').innerHTML = `
                        <div style="text-align:center;padding:40px">
                            <div style="font-size:48px;margin-bottom:16px">⚠️</div>
                            <h2 style="color:#991b1b;margin-bottom:12px">提交失败</h2>
                            <p style="color:#475569;line-height:1.6">${err.error || '未知错误'}</p>
                            <p style="font-size:12px;color:#94a3b8;margin-top:16px">请联系 Santa Chow 获取新的访问链接</p>
                        </div>`;
                    return;
                }
                const data = await res.json();
                resultId = data.result_id;
                renderResult(data.scores, name, exp, ind);
            } catch(e) {
                console.error('API error, using local calculation:', e);
                renderResultLocal(name, exp, ind);
            }
        }

        function getLevel(score) {
            if (score >= 4.0) return { label: '优秀', badge: 'badge-high' };
            if (score >= 3.0) return { label: '良好', badge: 'badge-mid' };
            if (score >= 2.0) return { label: '待提升', badge: 'badge-low' };
            return { label: '需加强', badge: 'badge-low' };
        }

                function renderResult(scores, name, exp, ind) {
            const title = `${name}${ind ? ' | '+ind : ''}${exp ? ' | '+exp : ''}`;
            document.getElementById('resultTitle').textContent = title;

            const dimOrder = ['COG','TEC','COM','SOC','ORG','PRS','MGT','LLA'];

            const avgAll = dimOrder.reduce((s, d) => s + scores[d].average, 0) / 8;
            const sorted = dimOrder.map(d => ({ dim: d, score: scores[d].average })).sort((a,b) => b.score - a.score);
            const top3 = sorted.slice(0, 3);
            const bot3 = sorted.slice(-3).reverse();
            const highDim = sorted[0].dim;
            const lowDim = sorted[sorted.length-1].dim;

            const persona = ReportEngine.matchPersona(scores);
            const tension = ReportEngine.getTension(highDim, lowDim);
            const closing = ReportEngine.getClosing(avgAll);

            const getScoreColor = (s) => ReportEngine.getScoreColor(s);
            const getLevelInfo = (s) => ReportEngine.getLevelInfo(s);

            let html = '';

            // overview badges
            html += '<div class="result-badges">' +
                '<span class="result-badge" style="background:#eef2ff;color:#1e3a8a">综合评估 ' + avgAll.toFixed(1) + '</span>' +
                '<span class="result-badge high">最高 ' + DIM_INFO[sorted[0].dim].name + ' ' + sorted[0].score.toFixed(1) + '</span>' +
                (sorted[sorted.length-1].score < 3.0 ? '<span class="result-badge low">关注 ' + DIM_INFO[sorted[sorted.length-1].dim].name + ' ' + sorted[sorted.length-1].score.toFixed(1) + '</span>' : '') +
            '</div>';

            // Persona card
            html += '<div class="persona-card fade-in">';
            html += '<div class="persona-name">' + persona.name + '</div>';
            html += '<div class="persona-metaphor">' + persona.metaphor + '</div>';
            html += '<div class="persona-meta">';
            html += '<span>核心驱动：' + persona.coreDrive + '</span>';
            html += '<span>成功的定义：' + persona.successDef + '</span>';
            html += '</div></div>';

            // Score grid
            html += '<div class="score-grid">';
            for (const dim of dimOrder) {
                const s = scores[dim];
                const info = DIM_INFO[dim];
                const level = getLevelInfo(s.average);
                const pct = (s.average / 5 * 100).toFixed(0);
                html += '<div class="score-card">' +
                    '<div class="icon">' + info.icon + '</div>' +
                    '<div class="dim-name">' + info.name + '</div>' +
                    '<div class="dim-score" style="color:' + getScoreColor(s.average) + '">' + s.average.toFixed(1) + '</div>' +

                '</div>';
            }
            html += '</div>';

            // TOP 3 Strengths
            const advantageDesc = {
                COG: { desc: '你拥有出色的认知加工能力，能够高效处理复杂信息并形成清晰判断。', traits: ['面对大量信息能快速提炼核心', '逻辑推理严谨，能发现论证漏洞', '学习新领域速度快于常人'] },
                TEC: { desc: '你具备较强的技术适应力，乐于拥抱新工具并能独立解决技术问题。', traits: ['AI和数据工具运用自如', '面对新技术能快速上手', '遇到问题能自主排查解决'] },
                COM: { desc: '你擅长解读他人意图并有效表达自己，在沟通场景中具有影响力。', traits: ['能准确理解言外之意', '复杂概念能用简洁语言说清', '公开发言能影响团队决策'] },
                SOC: { desc: '你对人际氛围高度敏感，善于在关系网络中建立信任与共识。', traits: ['能敏锐感知他人情绪变化', '擅长协调分歧、促进共识', '容易与不同背景的人建立信任'] },
                ORG: { desc: '你具备从目标到落地的完整策划执行能力，能在无人监督下保持高标准。', traits: ['能将模糊目标拆解为可衡量步骤', '无人督促仍维持高产出', '善用资源最大化目标达成'] },
                PRS: { desc: '你擅长在压力下快速找到创新解法，不被既有框架束缚。', traits: ['原方案失败能迅速提出Plan B', '用结构化方法深挖问题根源', '没有SOP时能自创有效方案'] },
                MGT: { desc: '你具备项目与预期管理能力，能协调多方资源推动目标达成。', traits: ['能管理上下级的期望预期', '多任务并行时准确判断优先级', '能有效授权并建立跟进机制'] },
                LLA: { desc: '你保持持续成长的学习姿态，主动拓展知识边界并能从挫折中提炼教训。', traits: ['定期阅读行业书刊、参加课程', '主动探索本职以外的领域', '能将批评和失败转化为成长养分'] }
            };

            html += '<div class="report-section"><h3>核心优势 TOP 3</h3>';
            for (const item of top3) {
                const info = DIM_INFO[item.dim];
                const ad = advantageDesc[item.dim];
                const scoreColor = getScoreColor(item.score);
                html += '<div class="strength-card fade-in">' +
                    '<div class="card-header">' +
                        '<span class="dim-icon">' + info.icon + '</span>' +
                        '<span class="dim-label" style="color:' + info.color + '">' + info.name + '</span>' +
                        '<span class="score-tag" style="background:' + scoreColor + '">' + item.score.toFixed(1) + '分</span>' +
                    '</div>' +
                    '<div class="card-desc">' + ad.desc + '</div>' +
                    '<ul class="card-traits">' + ad.traits.map(function(t) { return '<li>' + t + '</li>'; }).join('') + '</ul>' +
                '</div>';
            }
            html += '</div>';

            p += '<div style="margin-bottom:14px;display:flex;gap:8px;flex-wrap:wrap">';
            p += '<span style="background:#eef2ff;color:#1e3a8a;padding:3px 12px;border-radius:20px;font-size:10pt;font-weight:600">综合评估 ' + avgAll.toFixed(1) + '</span>';
            p += '<span style="background:#d1fae5;color:#065f46;padding:3px 12px;border-radius:20px;font-size:10pt;font-weight:600">最高：' + sorted[0].dim + ' ' + sorted[0].score.toFixed(1) + '</span>';
            if (sorted[sorted.length-1].score < 3.0) {
                p += '<span style="background:#fff7ed;color:#9a3412;padding:3px 12px;border-radius:20px;font-size:10pt;font-weight:600">关注：' + sorted[sorted.length-1].dim + ' ' + sorted[sorted.length-1].score.toFixed(1) + '</span>';
            }
            p += '</div>';

            // Score grid
            p += '<div class="print-score-grid">';
            for (const dim of dimOrder) {
                const s = scores[dim];
                const info = DIM_INFO[dim];
                const color = getScoreColor(s.average);
                p += '<div class="print-score-card">';
                p += '<div class="icon">' + info.icon + '</div>';
                p += '<div class="dim-name">' + info.name + '</div>';
                p += '<div class="score" style="color:' + color + '">' + s.average.toFixed(1) + '</div>';
                p += '</div>';
            }
            p += '</div>';

            // Top 3 strengths (unchanged)
            p += '<div class="print-section-title">核心优势 TOP 3</div>';
            for (const item of top3) {
                const info = DIM_INFO[item.dim];
                const ad = advantageDesc[item.dim];
                const color = getScoreColor(item.score);
                p += '<div class="print-card strength">';
                p += '<div class="print-card-header">';
                p += '<span style="font-size:14pt">' + info.icon + '</span>';
                p += '<span class="label" style="color:#065f46">' + info.name + '</span>';
                p += '<span class="score" style="background:' + color + '">' + item.score.toFixed(1) + '分</span>';
                p += '</div>';
                p += '<div class="print-card-desc">' + ad.desc + '</div>';
                p += '<ul class="print-card-traits">';
                for (const t of ad.traits) p += '<li>' + t + '</li>';
                p += '</ul></div>';
            }

            // Tension analysis
            if (tension) {
                p += '<div class="print-section-title">维度张力分析</div>';
                p += '<div style="background:#fef2f2;border-radius:10px;padding:12px 14px;margin-bottom:14px;border-left:4px solid #ef4444">';
                p += '<div style="font-weight:bold;font-size:11pt;margin-bottom:6px">' + DIM_INFO[highDim].icon + ' ' + DIM_INFO[highDim].name + ' (' + sorted[0].score.toFixed(1) + ') ↔ ' + DIM_INFO[lowDim].icon + ' ' + DIM_INFO[lowDim].name + ' (' + sorted[sorted.length-1].score.toFixed(1) + ')</div>';
                p += '<div style="font-size:9pt;color:#7f1d1d;line-height:1.6;margin-bottom:8px;padding:8px;background:rgba(255,255,255,0.5);border-radius:8px">' + tension.conflict + '</div>';
                p += '<div style="font-size:9pt;margin-bottom:4px"><strong>场景：</strong>' + tension.scenario.title + '</div>';
                p += '<div style="font-size:9pt;font-style:italic;color:#92400e;background:#fffbeb;padding:6px 10px;border-radius:6px;margin:4px 0">' + tension.scenario.innerOS + '</div>';
                p += '<div style="font-size:9pt;color:#7f1d1d;margin:6px 0">' + tension.scenario.analysis + '</div>';
                p += '<div style="display:flex;gap:8px;margin-top:8px;font-size:9pt">';
                p += '<div style="flex:1;background:#fef2f2;border-radius:6px;padding:6px 8px"><strong style="color:#dc2626">隐藏地雷：</strong>' + tension.landmine + '</div>';
                p += '<div style="flex:1;background:#f0fdf4;border-radius:6px;padding:6px 8px"><strong style="color:#16a34a">预防建议：</strong>' + tension.prevention + '</div>';
                p += '</div></div>';
            }

            // Development areas with reframe
            p += '<div class="print-section-title">发展空间（最具成长潜力）</div>';
            for (const item of bot3) {
                const info = DIM_INFO[item.dim];
                const dd = developmentDesc[item.dim];
                const color = getScoreColor(item.score);
                const reframe = ReportEngine.getReframe(item.dim, item.score);
                const reframeTitle = reframe ? reframe.title : (info.name + '提升方向');
                const reframeDesc = reframe ? reframe.reframe : (info.name + '提升后，你的职场竞争力将显著增强。');
                p += '<div class="print-card development">';
                p += '<div class="print-card-header">';
                p += '<span style="font-size:14pt">' + info.icon + '</span>';
                p += '<span class="label" style="color:#b45309">' + reframeTitle + '</span>';
                p += '<span class="score" style="background:' + color + '">' + item.score.toFixed(1) + '分</span>';
                p += '</div>';
                p += '<div class="print-card-desc">' + reframeDesc + '</div>';
                if (reframe) {
                    p += '<div style="font-size:8pt;color:#92400e;margin-bottom:6px">' + reframe.workplace + '</div>';
                }
                p += '<div class="print-dev-grid">';
                p += '<div><h4>常见表现</h4><ul>';
                for (const s of dd.signs) p += '<li>' + s + '</li>';
                p += '</ul></div>';
                p += '<div><h4>行动建议</h4><ul>';
                for (const a of dd.actions) p += '<li>' + a + '</li>';
                p += '</ul></div></div></div>';
            }

            // Sub-abilities
            p += '<div class="print-section-title page-break">子能力细分详解</div>';
            for (const dim of dimOrder) {
                const info = DIM_INFO[dim];
                const subs = subInfo[dim];
                const s = scores[dim];
                const color = getScoreColor(s.average);
                const dimQs = order.filter(function(q) { return q.dim === dim; });
                const subScores = subs.map(function(sub, idx) {
                    const items = dimQs.slice(idx*2, idx*2+2);
                    const avg = items.reduce(function(sum, q) { return sum + (answers[q.id] || 0); }, 0) / Math.max(items.length, 1);
                    return { name: sub.name, desc: sub.desc, avg: avg };
                });
                p += '<div style="margin-bottom:12px">';
                p += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">';
                p += '<span style="font-size:14pt">' + info.icon + '</span>';
                p += '<span style="font-weight:bold;font-size:11pt;color:' + info.color + '">' + info.name + '</span>';
                p += '<span style="font-size:14pt;font-weight:bold;color:' + color + ';margin-left:auto">' + s.average.toFixed(1) + '</span>';
                p += '</div>';
                p += '<div class="print-sub-grid">';
                for (const ss of subScores) {
                    const barColor = ss.avg >= 3.5 ? '#10b981' : ss.avg >= 2.5 ? '#f59e0b' : '#ef4444';
                    p += '<div class="print-sub-item">';
                    p += '<div class="name">' + ss.name + '</div>';
                    p += '<div class="score" style="color:' + barColor + '">' + ss.avg.toFixed(1) + '</div>';
                    p += '<div class="desc">' + ss.desc + '</div>';
                    p += '</div>';
                }
                p += '</div></div>';
            }

            // Action plan
            p += '<div class="print-section-title">总结与行动</div>';
            const actionOrder = bot3.concat(top3.slice(0,2));
            for (let i = 0; i < actionOrder.length; i++) {
                const item = actionOrder[i];
                const info = DIM_INFO[item.dim];
                const dd = developmentDesc[item.dim];
                const isPriority = i < bot3.length;
                p += '<div class="print-action-item ' + (isPriority ? 'action-priority' : 'action-maintain') + '">';
                p += '<span class="dot">' + (isPriority ? '🔴' : '🟢') + '</span>';
                p += '<div>';
                p += '<div class="title" style="color:' + (isPriority ? '#b45309' : '#065f46') + '">' + (isPriority ? '优先提升' : '持续保持') + ' · ' + info.name + ' (' + item.score.toFixed(1) + '分)</div>';
                p += '<div class="action">' + (isPriority ? (dd.actions[0] || '') : '继续在工作中发挥这项优势') + '</div>';
                p += '</div></div>';
            }

            // Disclaimer + closing
            p += '<div class="print-disclaimer">本报告基于自评数据，仅供参考。自评可能受个人认知偏差影响，建议结合他人的客观反馈进行综合分析。如需一对一专业求职定位咨询，请联系 Santa Chow 教练获取个人化指导。</div>';
            if (closing) {
                p += '<div style="margin-top:16px;padding:12px 14px;background:#eef2ff;border-radius:10px;font-size:9pt;color:#1e40af;line-height:1.6;border-left:4px solid #1e3a8a">' + closing.message + '</div>';
            }
            p += '<div class="print-footer">© 2026 Santa Chow · 8维能力深度评测系统 &nbsp;|&nbsp; SantaChow.com</div>';

            document.querySelector('#printArea .print-page').innerHTML = p;
        }

function downloadPDF() {
            const dimOrder = ['COG','TEC','COM','SOC','ORG','PRS','MGT','LLA'];
            const scores = {};
            for (const dim of dimOrder) {
                const items = questions.filter(q => q.dim === dim);
                const avg = items.reduce((s, q) => s + (answers[q.id] || 0), 0) / items.length;
                scores[dim] = { average: Math.round(avg*100)/100 };
            }
            const name = document.getElementById('userName').value || '匿名用户';
            const exp = document.getElementById('experience').value;
            const ind = document.getElementById('industry').value;
            buildPrintContent(scores, name, exp, ind);
            setTimeout(() => window.print(), 200);
        }

        // Keyboard: Enter to continue
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !document.getElementById('quizSection').classList.contains('hidden')) {
                const btn = document.getElementById('nextBtn');
                if (!btn.disabled) btn.click();
            }
        });
    </script>

    <!-- 打印专用内容区 — 屏幕隐藏，仅打印时显示 -->
    <div id="printArea"><div class="print-page"></div></div>
</body>
</html>
