<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8维能力测评 | Santa Chow</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            /* 柔和配色方案 - v3.3 */
            --primary: #8b7355;
            --primary-light: #a89070;
            --secondary: #9e948a;
            --accent: #c4907a;
            --dark: #3d3530;
            --light: #faf8f5;
            --success: #7d9b76;
            --gray-200: #e8e0d8;
            --gray-400: #9e948a;
            /* 求进避坑色系 */
            --charge: #7d9b76;
            --charge-light: #f5f9f4;
            --shield: #c4907a;
            --shield-light: #faf6f4;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft YaHei", "Noto Sans SC", "PingFang SC", sans-serif;
            background: var(--dark);
            min-height: 100vh;
            overflow-x: hidden;
        }
        /* 香港高楼大厦背景 */
        .hero-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; z-index: 0; overflow: hidden; }
        .hero-bg::before {
            content: '';
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                linear-gradient(to bottom, rgba(30,25,20,0.15) 0%, rgba(30,25,20,0.35) 30%, rgba(30,25,20,0.75) 70%, rgba(30,25,20,0.95) 100%),
                url('https://images.unsplash.com/photo-1536599018102-9f803c140fc1?w=1920&q=80') center/cover;
            animation: slowZoom 60s ease-in-out infinite alternate;
        }
        @keyframes slowZoom { from { transform: scale(1); } to { transform: scale(1.08); } }
        .city-silhouette {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 20%;
            background: linear-gradient(to top, rgba(30,25,20,0.5) 0%, transparent 100%);
            pointer-events: none;
        }
        .main-container { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
        .logo-section { text-align: center; margin-bottom: 40px; animation: fadeInDown 0.8s ease-out; }
        .logo { font-size: 13px; letter-spacing: 4px; color: var(--accent); font-weight: 600; }
        .logo-section h1 { font-size: 34px; color: white; margin-top: 10px; font-weight: 700; letter-spacing: 2px; }
        .logo-section p { color: rgba(255,255,255,0.6); margin-top: 8px; font-size: 15px; }
        .tagline { color: var(--accent); font-size: 17px; font-weight: 500; margin-top: 6px; }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .card { max-width: 720px; width: 100%; background: rgba(250,248,245,0.97); border-radius: 20px; padding: 40px; backdrop-filter: blur(20px); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); animation: fadeInUp 0.6s ease-out; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none !important; }

        /* Info Section */
        .info-title { font-size: 22px; font-weight: 700; color: var(--dark); margin-bottom: 8px; }
        .info-subtitle { font-size: 14px; color: var(--gray-400); margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 14px; font-weight: 600; color: var(--secondary); margin-bottom: 6px; }
        .form-group input, .form-group select {
            width: 100%; padding: 14px 16px; border: 2px solid var(--gray-200); border-radius: 12px;
            font-size: 15px; transition: border-color 0.2s; background: white;
        }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--primary); }

        /* Progress */
        .progress-container { display: flex; align-items: center; gap: 16px; margin-bottom: 30px; }
        .progress-bar { flex: 1; height: 8px; background: var(--gray-200); border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--primary-light)); border-radius: 4px; transition: width 0.4s ease; }
        .progress-text { font-size: 13px; color: var(--gray-400); font-weight: 600; min-width: 60px; text-align: right; }

        /* Question */
        .question-card { background: var(--light); border-radius: 16px; padding: 24px; margin-bottom: 24px; }
        .question-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .question-dimension { font-size: 12px; color: var(--primary); background: rgba(139,115,85,0.1); padding: 4px 12px; border-radius: 20px; font-weight: 600; }
        .question-number { font-size: 12px; color: var(--gray-400); }
        .question-text { font-size: 17px; font-weight: 500; color: var(--dark); line-height: 1.6; margin-bottom: 20px; }

        /* Options */
        .options-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .option { position: relative; }
        .option input { position: absolute; opacity: 0; }
        .option label {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            padding: 12px 4px; background: white; border: 2px solid var(--gray-200);
            border-radius: 12px; cursor: pointer; transition: all 0.2s;
        }
        .option label:hover { border-color: var(--primary-light); background: #f8f5f0; }
        .option input:checked + label { border-color: var(--primary); background: #f5f0e8; box-shadow: 0 0 0 3px rgba(139,115,85,0.15); }
        .option .opt-num { font-size: 16px; font-weight: 700; color: var(--primary); }
        .option .opt-label { font-size: 10px; color: var(--gray-400); text-align: center; line-height: 1.3; }

        /* Buttons */
        .nav-buttons { display: flex; justify-content: space-between; gap: 12px; margin-top: 8px; }
        .btn {
            padding: 14px 32px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600;
            cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-light); transform: translateY(-2px); }
        .btn-secondary { background: white; color: var(--secondary); border: 2px solid var(--gray-200); }
        .btn-secondary:hover { border-color: var(--gray-400); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        /* ============================== */
        /*  RESULT SECTION — v3.3 四阶递进 */
        /* ============================== */
        .result-header { text-align: center; padding: 10px 0 20px; }
        .result-header h2 { font-size: 28px; color: var(--dark); }
        .result-header p { color: var(--gray-400); margin-top: 8px; font-size: 13px; }
        .result-btn-group { display: flex; gap: 10px; justify-content: center; margin-top: 16px; flex-wrap: wrap; }

        /* 四阶通用样式 */
        .phase-section { margin: 20px 0; }
        .phase-title { font-size: 15px; font-weight: 700; color: var(--primary); margin-bottom: 5px; }
        .phase-subtitle { font-size: 11px; color: var(--gray-400); margin-bottom: 14px; }

        /* 情绪天气预报 */
        .weather-card {
            background: #fdf8f3;
            border-radius: 14px;
            padding: 14px 16px;
            border: 1.5px solid var(--accent);
            margin-bottom: 14px;
        }
        .weather-card .weather-title { font-size: 13px; font-weight: 700; color: #5d4e37; margin-bottom: 4px; }
        .weather-card .weather-text { font-size: 12px; color: #7d6e5a; line-height: 1.5; }

        /* 数据锚点表 */
        .anchor-table { width: 100%; border-collapse: separate; border-spacing: 0; margin-bottom: 12px; }
        .anchor-table th {
            padding: 8px 10px; font-size: 11px; font-weight: 700; color: white;
            border-radius: 8px 8px 0 0;
        }
        .anchor-table td {
            padding: 7px 10px; font-size: 12px; border-bottom: 1px solid #e8e0d8;
        }
        .anchor-table tr:last-child td { border-bottom: none; }
        .anchor-table tr:last-child td:first-child { border-radius: 0 0 0 8px; }
        .anchor-table tr:last-child td:last-child { border-radius: 0 0 8px 0; }

        /* 求进卡 */
        .charge-card {
            background: var(--charge-light);
            border-radius: 14px;
            padding: 14px 16px;
            margin-bottom: 12px;
            border-top: 3px solid var(--charge);
            border-left: 1px solid #d4e2ce;
            border-right: 1px solid #d4e2ce;
            border-bottom: 1px solid #d4e2ce;
        }
        .charge-card .card-title { font-size: 13px; font-weight: 700; color: #5a7a52; margin-bottom: 8px; }
        .charge-card .card-content { font-size: 12px; color: #3d4a35; line-height: 1.6; }
        .charge-card .card-content p { margin-bottom: 6px; }
        .charge-card .card-content ul { list-style: none; padding: 0; }
        .charge-card .card-content li { padding: 3px 0 3px 16px; position: relative; }
        .charge-card .card-content li::before { content: '•'; position: absolute; left: 0; color: var(--charge); font-weight: bold; }

        /* 避坑卡 */
        .shield-card {
            background: var(--shield-light);
            border-radius: 14px;
            padding: 14px 16px;
            margin-bottom: 12px;
            border-top: 3px solid var(--shield);
            border-left: 1px solid #e0c4ba;
            border-right: 1px solid #e0c4ba;
            border-bottom: 1px solid #e0c4ba;
        }
        .shield-card .card-title { font-size: 13px; font-weight: 700; color: #9e6555; margin-bottom: 8px; }
        .shield-card .card-content { font-size: 12px; color: #4a3d35; line-height: 1.6; }
        .shield-card .card-content p { margin-bottom: 6px; }
        .shield-card .card-content ul { list-style: none; padding: 0; }
        .shield-card .card-content li { padding: 3px 0 3px 16px; position: relative; }
        .shield-card .card-content li::before { content: '•'; position: absolute; left: 0; color: var(--shield); font-weight: bold; }

        /* 逻辑钩子 */
        .hook-text { font-size: 12px; color: var(--gray-400); line-height: 1.5; margin: 12px 0; font-style: italic; }

        /* 场景演练 */
        .scenario-card { margin-bottom: 14px; }
        .scenario-header { font-size: 13px; font-weight: 700; margin-bottom: 8px; padding: 8px 12px; border-radius: 8px 8px 0 0; }
        .scenario-header.charge { background: var(--charge-light); color: #5a7a52; border-left: 3px solid var(--charge); }
        .scenario-header.shield { background: var(--shield-light); color: #9e6555; border-left: 3px solid var(--shield); }

        /* 策略卡 */
        .strategy-card {
            background: var(--charge-light);
            border-radius: 14px;
            padding: 14px 16px;
            margin-bottom: 10px;
            border-top: 2px solid var(--charge);
        }
        .strategy-card .strategy-title { font-size: 13px; font-weight: 700; color: #5a7a52; margin-bottom: 8px; }
        .strategy-card .strategy-content { font-size: 12px; color: #3d4a35; line-height: 1.6; }
        .strategy-card .strategy-content ul { list-style: none; padding: 0; }
        .strategy-card .strategy-content li { padding: 3px 0 3px 16px; position: relative; }
        .strategy-card .strategy-content li::before { content: '•'; position: absolute; left: 0; color: var(--charge); font-weight: bold; }

        /* 安全垫卡 */
        .safety-card {
            background: var(--shield-light);
            border-radius: 14px;
            padding: 14px 16px;
            margin-bottom: 10px;
            border-top: 2px solid var(--shield);
        }
        .safety-card .safety-title { font-size: 13px; font-weight: 700; color: #9e6555; margin-bottom: 8px; }
        .safety-card .safety-content { font-size: 12px; color: #4a3d35; line-height: 1.6; }
        .safety-card .safety-content ul { list-style: none; padding: 0; }
        .safety-card .safety-content li { padding: 3px 0 3px 16px; position: relative; }
        .safety-card .safety-content li::before { content: '•'; position: absolute; left: 0; color: var(--shield); font-weight: bold; }

        /* 结语卡 */
        .closing-card {
            background: #f8f5f2;
            border-radius: 14px;
            padding: 16px;
            margin-top: 16px;
            border-top: 3px solid var(--primary);
        }
        .closing-card .closing-title { font-size: 14px; font-weight: 700; color: var(--primary); margin-bottom: 8px; }
        .closing-card .closing-text { font-size: 12px; color: #5d4e37; line-height: 1.7; }
        .closing-card .closing-text p { margin-bottom: 6px; }

        /* 附录 - 8维总览 */
        .appendix-section { margin-top: 20px; }
        .appendix-title { font-size: 15px; font-weight: 700; color: var(--primary); margin-bottom: 12px; }
        .score-overview { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 14px; }
        .score-overview-item {
            background: var(--light);
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            border: 1px solid var(--gray-200);
        }
        .score-overview-item .icon { font-size: 20px; }
        .score-overview-item .name { font-size: 11px; color: var(--secondary); margin: 4px 0 2px; }
        .score-overview-item .score { font-size: 18px; font-weight: 700; margin: 2px 0; }
        .score-overview-item.high-light { background: var(--charge-light); border-color: #c8dcc7; }
        .score-overview-item.low-light { background: #fdf6f0; border-color: #e0c4ba; }

        /* 评分说明 */
        .legend-card {
            background: #f5f0e8;
            border-radius: 10px;
            padding: 12px 14px;
            margin-top: 12px;
        }
        .legend-card .legend-title { font-size: 12px; font-weight: 700; color: var(--primary); margin-bottom: 6px; }
        .legend-card .legend-item { font-size: 11px; color: #6b5b4f; padding: 3px 0; }

        /* 页脚 */
        .result-footer {
            margin-top: 20px;
            padding: 10px;
            background: var(--primary);
            border-radius: 10px;
            text-align: center;
            font-size: 12px;
            color: white;
        }

        /* Loading */
        .loading { text-align: center; padding: 60px 20px; }
        .loading-spinner { width: 48px; height: 48px; border: 4px solid var(--gray-200); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        /* 打印优化样式 */
        @media print {
            body { background: white; }
            .hero-bg { display: none; }
            .main-container { padding: 20px; }
            .card { box-shadow: none; border: 1px solid #e8e0d8; }
            .result-btn-group { display: none; }
            .footer { color: #999 !important; }
            .no-print { display: none; }
            button { display: none; }
        }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeInUp 0.5s ease-out; }

        /* 分割线 */
        .section-divider { height: 1px; background: linear-gradient(to right, transparent, var(--gray-200), transparent); margin: 20px 0; }

        /* 维度标签 */
        .dim-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .dim-badge.high { background: var(--charge-light); color: #5a7a52; }
        .dim-badge.mid { background: #f5f0e8; color: var(--primary); }
        .dim-badge.low { background: #fdf6f0; color: #9e6555; }

        /* 子能力条 */
        .sub-bar-container { display: flex; align-items: center; gap: 8px; margin: 6px 0; }
        .sub-bar-label { font-size: 11px; color: var(--secondary); min-width: 60px; }
        .sub-bar-track { flex: 1; height: 6px; background: var(--gray-200); border-radius: 3px; overflow: hidden; }
        .sub-bar-fill { height: 100%; border-radius: 3px; transition: width 0.8s ease; }
        .sub-bar-score { font-size: 11px; font-weight: 700; min-width: 28px; text-align: right; }
    </style>

    <script src="report_engine_data.js"></script>
    <script src="report_engine.js"></script>
</head>
<body>
    <div class="hero-bg"><div class="city-silhouette"></div></div>
    <div class="main-container">
        <div class="logo-section">
            <div class="logo">✦ SANTA CHOW</div>
            <h1>8维能力深度评测</h1>
            <p>48道情境题 · 精准定位你的职场核心竞争力</p>
            <div class="tagline">耗时约 8-10 分钟</div>
        </div>

        <div class="card" id="infoSection">
            <div class="info-title">📋 开始评测前</div>
            <div class="info-subtitle">请填写以下基本资料 · 测评结果将用于后续常模对比</div>
            <div class="form-group">
                <label>姓名 (选填)</label>
                <input type="text" id="userName" placeholder="你的名字">
            </div>
            <div class="form-group">
                <label>工作经验 *</label>
                <select id="experience">
                    <option value="">请选择...</option>
                    <option value="应届生">应届生</option>
                    <option value="1-3年">1-3年</option>
                    <option value="3-5年">3-5年</option>
                    <option value="5-10年">5-10年</option>
                    <option value="10年以上">10年以上</option>
                </select>
            </div>
            <div class="form-group">
                <label>当前/目标行业 (选填)</label>
                <select id="industry">
                    <option value="">请选择...</option>
                    <option value="银行/金融">银行/金融</option>
                    <option value="投资银行">投资银行</option>
                    <option value="四大审计">四大审计</option>
                    <option value="管理咨询">管理咨询</option>
                    <option value="科技/互联网">科技/互联网</option>
                    <option value="保险">保险</option>
                    <option value="房地产">房地产</option>
                    <option value="零售/快消">零售/快消</option>
                    <option value="政府/公共事业">政府/公共事业</option>
                    <option value="教育">教育</option>
                    <option value="医疗/制药">医疗/制药</option>
                    <option value="其他">其他</option>
                </select>
            </div>
            <button class="btn btn-primary" onclick="startQuiz()" style="width:100%;justify-content:center;margin-top:10px">开始评测 →</button>
        </div>

        <div class="card hidden" id="quizSection">
            <div class="progress-container">
                <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                <div class="progress-text" id="progressText">1 / 48</div>
            </div>
            <div id="questionContainer"></div>
            <div class="nav-buttons">
                <button class="btn btn-secondary" id="prevBtn" onclick="prevQuestion()">← 上一题</button>
                <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">下一题 →</button>
            </div>
        </div>

        <div class="card hidden" id="resultSection">
            <div class="result-header">
                <h2>🎯 评测完成！</h2>
                <p id="resultTitle"></p>
                <div class="result-btn-group">
                    <button class="btn btn-secondary" onclick="exportImage()">📷 导出图片</button>
                    <button class="btn btn-secondary" onclick="location.reload()">重新评测</button>
                </div>
            </div>
            <div id="resultContent"></div>
        </div>

        <div class="footer" style="margin-top:30px;text-align:center;color:rgba(255,255,255,0.4);font-size:12px">
            <p>© 2026 <a href="#" style="color:rgba(255,255,255,0.5)">Santa Chow</a> · 8维能力深度评测系统</p>
            <p style="margin-top:4px">数据仅用于常模统计，不涉及个人隐私</p>
        </div>
    </div>

    <script>
        const DIM_INFO = {
            COG: { name: '认知能力', icon: '🧠', color: '#3b82f6' },
            TEC: { name: '技术掌握', icon: '💻', color: '#10b981' },
            COM: { name: '理解表达', icon: '💬', color: '#f59e0b' },
            SOC: { name: '社交技能', icon: '🤝', color: '#ef4444' },
            ORG: { name: '策划执行', icon: '🎯', color: '#8b5cf6' },
            PRS: { name: '解决问题', icon: '⚡', color: '#ec4899' },
            MGT: { name: '管理技能', icon: '👥', color: '#14b8a6' },
            LLA: { name: '持续学习', icon: '📚', color: '#f97316' }
        };

        const questions = [
            // === COG 认知能力 (1-6) ===
            { id: 1, dim: 'COG', text: '我能从大量复杂资讯中，快速提取关键重点。' },
            { id: 2, dim: 'COG', text: '我擅长用图表或结构化方式呈现复杂资讯。' },
            { id: 3, dim: 'COG', text: '面对矛盾资讯时，我能理性分析并做出合理判断。' },
            { id: 4, dim: 'COG', text: '我能发现论证中的逻辑漏洞或不一致之处。' },
            { id: 5, dim: 'COG', text: '我能在短时间内掌握一个全新的知识领域。' },
            { id: 6, dim: 'COG', text: '相较于同侪，我学习新事物的速度明显更快。' },
            // === TEC 技术掌握能力 (7-12) ===
            { id: 7, dim: 'TEC', text: '我熟练使用AI工具（ChatGPT、Claude等）提升工作效率。' },
            { id: 8, dim: 'TEC', text: '我能有效运用数据分析工具（Excel/Tableau等）处理工作数据。' },
            { id: 9, dim: 'TEC', text: '面对新技术或新系统，我能快速上手适应。' },
            { id: 10, dim: 'TEC', text: '我乐于尝试新工具来优化现有工作流程。' },
            { id: 11, dim: 'TEC', text: '遇到技术问题时，我能有条理地排查根本原因。' },
            { id: 12, dim: 'TEC', text: '我不依赖他人，能自行解决大部分技术难题。' },

        function shuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function startQuiz() {

        function renderQuestion() {
            const q = order[currentQ];

            const pct = ((currentQ + 1) / total * 100).toFixed(0);
            document.getElementById('progressFill').style.width = pct + '%';
            document.getElementById('progressText').textContent = `${currentQ+1} / ${total}`;
            document.getElementById('prevBtn').disabled = currentQ === 0;

            const nextLabel = currentQ === total - 1 ? '提交评测 ✓' : '下一题 →';

            let optHtml = OPTIONS.map((o, i) => {
                const checked = answers[q.id] === o.val ? 'checked' : '';
                return `<div class="option">

                    <label for="opt${i}">
                        <span class="opt-num">${o.val}</span>
                        <span class="opt-label">${o.label}</span>
                    </label>

            }).join('');

            const selected = document.querySelector('input[name="ans"]:checked');

        function getSubScores(dim) {
            const dimQs = order.filter(q => q.dim === dim);
            const subNames = {

                TEC: ['数字生产力', '技术适应力', '故障排查'],

                LLA: ['知识更新', '主动探索', '挫折转化']
            };
            const names = subNames[dim] || [];
            return names.map((n, i) => {
                const items = dimQs.slice(i * 2, i * 2 + 2);
                const avg = items.reduce((s, q) => s + (answers[q.id] || 0), 0) / Math.max(items.length, 1);
                return { name: n, score: avg };
            });

            html += `<div style="font-size:13px;font-weight:700;color:#9e6555;margin:16px 0 10px">安全防御策略（20%篇幅）<span style="font-size:10px;color:#9e948a;font-weight:400">[避坑指南]</span></div>`;

                            <li><b>避坑话术：</b>"关于这个任务，我目前手上有A和B两个项目在并行，如果要保证质量，我需要先和你对齐一下优先级。你看我们约个5分钟的会？"</li>
                        </ul>
                    </div>
                </div>`;
            } else {
                html += `<div class="charge-card"><div class="card-content"><p>您在所有核心维度上都表现稳健，没有明显的"防护区"。建议持续保持当前的平衡发展策略。</p></div></div>`;

            html += `<div class="closing-card">
                <div class="closing-title">进化寄语：攻守兼备，方能行稳致远</div>

                    <p>真正的职场强者，不是没有弱点，而是懂得：</p>
                    <p>• 如何利用天赋去<b>创造赢的机会</b>（求进）</p>
                    <p>• 如何用策略守住自己的<b>能量边界</b>（避坑）</p>
                    <p>您的${topDim.name}（${highest.score.toFixed(1)}）是您在"攻"端的利器，而您的${lowDim.name}（${lowest.score.toFixed(1)}）意识是您在"守"端的雷达。<b>您不需要变成一个没有情绪的人，您需要的是学会在情绪来临时，用您的逻辑大脑为它找一个结构化的出口。</b></p>
                </div>
            </div>`;
            html += `</div>`;

            html += `<div class="section-divider"></div>`;
            html += `<div class="appendix-section fade-in">

            html += `<div class="score-overview">`;
            for (const dim of dimOrder) {
                const s = scores[dim];

                const color = getScoreColor(s.average);
                const badge = getLevelBadge(s.average);
                const isHigh = s.average >= 4.0;

                html += `<div class="score-overview-item ${isHigh ? 'high-light' : ''} ${isLow ? 'low-light' : ''}">

            for (const dim of dimOrder.slice(0, 4)) {

                    </div>`;

                    const subColor = getScoreColor(sub.score);

            </div>`;

            document.getElementById('resultContent').innerHTML = html;
        }

        function renderResultLocal(name, exp, ind) {
            const dimOrder = ['COG','TEC','COM','SOC','ORG','PRS','MGT','LLA'];
            const dimQs = {};
            for (const dim of dimOrder) dimQs[dim] = questions.filter(q => q.dim === dim);
            const scores = {};
            for (const dim of dimOrder) {
                const items = dimQs[dim];
                const avg = items.reduce((s, q) => s + (answers[q.id] || 0), 0) / items.length;
                scores[dim] = { average: Math.round(avg*100)/100 };
            }
            renderResult(scores, name, exp, ind);
            console.warn('Local calculation mode — server unavailable');
        }

        // 导出图片功能 (使用 Playwright 截图)
        function exportImage() {
            if (!resultId) {
                alert('请先完成测评以生成图片');
                return;
            }
            // 打开图片导出 URL（PNG 格式，高清）
            window.open(`/api/quiz/report_48/${resultId}/image`, '_blank');
        }

        // 打印报告功能 (使用浏览器打印为PDF)
        function printReport() {
            // 检查是否有结果可以打印
            if (!document.getElementById('resultSection').classList.contains('hidden')) {
                // 隐藏按钮组
                const btnGroup = document.querySelector('.result-btn-group');
                if (btnGroup) btnGroup.classList.add('no-print');
                
                // 调用打印
                window.print();
                
                // 打印后恢复按钮显示
                setTimeout(() => {
                    if (btnGroup) btnGroup.classList.remove('no-print');
                }, 500);
            } else {
                alert('请先完成测评以查看结果');
            }
        }

        // Keyboard: Enter to continue
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !document.getElementById('quizSection').classList.contains('hidden')) {
                const btn = document.getElementById('nextBtn');
                if (!btn.disabled) btn.click();
            }
        });
    </script>
