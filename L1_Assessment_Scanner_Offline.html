<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>职场禀赋扫描仪 - 基础测评</title>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        /* 香港高楼大厦背景 */
        .hero-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; z-index: 0; overflow: hidden; }
        .hero-bg::before {
            content: '';
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background:
                linear-gradient(to bottom, rgba(30,25,20,0.15) 0%, rgba(30,25,20,0.35) 30%, rgba(30,25,20,0.75) 70%, rgba(30,25,20,0.95) 100%),
                url('https://images.unsplash.com/photo-1536599018102-9f803c140fc1?w=1920&q=80') center/cover;
            animation: slowZoom 60s ease-in-out infinite alternate;
        }
        @keyframes slowZoom { from { transform: scale(1); } to { transform: scale(1.08); } }
        .city-silhouette {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 20%;
            background: linear-gradient(to top, rgba(30,25,20,0.5) 0%, transparent 100%);
            pointer-events: none; z-index: 0;
        }
        .main-container { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }

        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333;
            --border-radius: 12px;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'PingFang HK', 'Microsoft JhengHei', 'Segoe UI', sans-serif;
            background: transparent;
            color: var(--text-color);
            line-height: 1.6;
            margin:0;
            padding:0;
        }

        .container {
            max-width: 800px;
            width: 100%;
            margin: 40px auto;
            background: rgba(255,255,255,0.97);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            backdrop-filter: blur(20px);
            animation: fadeInUp 0.6s ease-out;
        }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        header {
            text-align: center;
            border-bottom: 2px solid var(--bg-color);
            margin-bottom: 30px;
            padding-bottom: 20px;
        }

        h1 { color: var(--primary-color); margin-bottom: 10px; font-size: 24pt; }
        p.subtitle { color: #666; font-size: 11pt; }

        .intro-box {
            background: #eef7fd;
            padding: 20px;
            border-left: 5px solid var(--accent-color);
            margin-bottom: 30px;
            font-size: 10.5pt;
        }

        .section-title {
            font-size: 14pt;
            color: var(--primary-color);
            margin: 40px 0 20px;
            display: flex;
            align-items: center;
        }

        .section-title::before {
            content: "";
            display: inline-block;
            width: 4px;
            height: 20px;
            background: var(--accent-color);
            margin-right: 10px;
        }

        .question-card {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px dashed #eee;
        }

        .question-text {
            font-weight: 600;
            margin-bottom: 15px;
            display: block;
        }

        .options-group {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .option {
            flex: 1;
            text-align: center;
        }

        .option input { display: none; }

        .option label {
            display: block;
            padding: 10px 5px;
            background: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            font-size: 9pt;
            transition: all 0.2s;
        }

        .option input:checked + label {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        .option label:hover { background: #e9ecef; }

        .meta-form {
            background: #fafafa;
            padding: 25px;
            border-radius: var(--border-radius);
            margin-top: 50px;
            border: 1px solid #eee;
        }

        .form-group { margin-bottom: 15px; }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }

        .submit-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 12pt;
            font-weight: bold;
            cursor: pointer;
            margin-top: 30px;
            transition: background 0.3s;
        }

        .submit-btn:hover { background: #1a252f; }

        footer {
            text-align: center;
            margin-top: 40px;
            color: #999;
            font-size: 9pt;
        }

        /* ========== Progress Bar ========== */
        .progress-bar-wrap {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--card-bg);
            padding: 12px 0 8px;
            margin-bottom: 10px;
            border-bottom: 1px solid #eee;
        }
        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 9pt;
            color: #888;
            margin-bottom: 6px;
        }
        .progress-track {
            height: 6px;
            background: #e9ecef;
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-color), #2ecc71);
            border-radius: 3px;
            transition: width 0.3s ease;
            width: 0%;
        }

        /* ========== Report Page ========== */
        #reportPage { display: none; }

        .report-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--bg-color);
        }
        .report-header h1 { font-size: 22pt; margin-bottom: 5px; }
        .report-header .report-meta {
            color: #888;
            font-size: 10pt;
        }

        .report-section {
            margin: 30px 0;
        }
        .report-section-title {
            font-size: 14pt;
            color: var(--primary-color);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }
        .report-section-title::before {
            content: "";
            display: inline-block;
            width: 4px;
            height: 20px;
            background: var(--accent-color);
            margin-right: 10px;
        }

        /* Radar Chart */
        .radar-wrap {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }
        .radar-wrap canvas {
            max-width: 100%;
        }

        /* Dimension Score Cards */
        .dim-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
        }
        .dim-card {
            background: #fafafa;
            border-radius: 10px;
            padding: 18px;
            border-left: 4px solid var(--accent-color);
        }
        .dim-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .dim-card-name {
            font-weight: bold;
            font-size: 11pt;
            color: var(--primary-color);
        }
        .dim-card-score {
            font-size: 18pt;
            font-weight: bold;
        }
        .dim-card-level {
            font-size: 9pt;
            color: #888;
            margin-bottom: 10px;
        }
        .dim-bar-track {
            height: 6px;
            background: #e9ecef;
            border-radius: 3px;
            overflow: hidden;
        }
        .dim-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.8s ease;
        }
        .dim-card-desc {
            font-size: 9pt;
            color: #666;
            margin-top: 8px;
        }

        /* Strengths & Growth */
        .analysis-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .analysis-box {
            border-radius: 10px;
            padding: 20px;
        }
        .analysis-box.strength {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
        }
        .analysis-box.growth {
            background: #fef3c7;
            border: 1px solid #fde68a;
        }
        .analysis-box h4 {
            margin: 0 0 12px;
            font-size: 11pt;
        }
        .analysis-box.strength h4 { color: #166534; }
        .analysis-box.growth h4 { color: #92400e; }
        .analysis-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 10px;
            font-size: 9.5pt;
        }
        .analysis-item .icon {
            margin-right: 8px;
            font-size: 12pt;
            flex-shrink: 0;
        }

        /* Industry Match */
        .industry-match-box {
            background: #eef7fd;
            border: 1px solid #bfdbfe;
            border-radius: 10px;
            padding: 20px;
        }
        .industry-match-box h4 {
            color: var(--primary-color);
            margin: 0 0 12px;
            font-size: 11pt;
        }
        .industry-match-box p {
            font-size: 10pt;
            margin: 0 0 8px;
        }
        .industry-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        .industry-tag {
            background: white;
            border: 1px solid #93c5fd;
            border-radius: 20px;
            padding: 4px 14px;
            font-size: 9pt;
            color: var(--primary-color);
        }

        /* Summary */
        .summary-box {
            background: linear-gradient(135deg, #2c3e50, #3498db);
            color: white;
            border-radius: 10px;
            padding: 25px;
            font-size: 10.5pt;
            line-height: 1.8;
        }
        .summary-box h4 {
            margin: 0 0 12px;
            font-size: 12pt;
        }

        /* Print Button */
        .print-btn {
            display: inline-block;
            padding: 12px 30px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 11pt;
            font-weight: bold;
            cursor: pointer;
            margin: 20px 10px 0 0;
            transition: background 0.3s;
        }
        .print-btn:hover { background: #2980b9; }
        .back-btn {
            display: inline-block;
            padding: 12px 30px;
            background: #e9ecef;
            color: var(--primary-color);
            border: none;
            border-radius: 8px;
            font-size: 11pt;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s;
        }
        .back-btn:hover { background: #dee2e6; }

        .report-actions {
            text-align: center;
            margin: 30px 0 20px;
            padding-top: 20px;
            border-top: 1px dashed #eee;
        }

        /* ========== Print Styles ========== */
        @media print {
            body { padding: 0; background: white; }
            .container { box-shadow: none; padding: 20px; }
            .print-btn, .back-btn { display: none !important; }
            .report-actions { display: none !important; }
            .question-card { page-break-inside: avoid; }
            .dim-card { page-break-inside: avoid; }
        }

        /* Mobile */
        @media (max-width: 600px) {
            .container { padding: 20px; }
            .dim-grid, .analysis-grid { grid-template-columns: 1fr; }
            .options-group { flex-wrap: wrap; }
            .option { flex: 0 0 30%; margin-bottom: 5px; }
            h1 { font-size: 18pt; }
        }
    </style>
</head>
<body>
    <div class="hero-bg"></div>
    <div class="city-silhouette"></div>
    <div class="main-container">

<!-- ==================== QUIZ PAGE ==================== -->
<div class="container" id="quizPage">
    <header>
        <h1>职场禀赋扫描仪</h1>
        <p class="subtitle">解锁你的职场基因 · 发现隐藏的专业天赋</p>
    </header>

    <div class="intro-box">
        <strong>测评说明：</strong><br>
        本测评共 55 题，预计用时 10 分钟。请根据您在工作或学习中的<strong>真实行为频率</strong>做出选择。
        这不是考试，没有标准答案，越真实的回答越能帮助您精确定位。
    </div>

    <div class="progress-bar-wrap" id="progressBar">
        <div class="progress-info">
            <span>答题进度</span>
            <span id="progressText">0 / 55</span>
        </div>
        <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
        </div>
    </div>

    <form id="assessmentForm">
        <div id="questionsContainer"></div>

        <div class="meta-form">
            <h3 style="margin-top:0;">最后一步：领取你的个人化报告</h3>
            <div class="form-group">
                <label>姓名/昵称</label>
                <input type="text" name="userName" required placeholder="如何称呼您？">
            </div>
            <div class="form-group">
                <label>毕业院校 / 在读院校</label>
                <input type="text" name="userSchool" required>
            </div>
            <div class="form-group">
                <label>目标行业意向</label>
                <select name="targetIndustry" required>
                    <option value="">请选择...</option>
                    <option value="1">金融与法律服务</option>
                    <option value="2">信息与通信技术 (ICT)</option>
                    <option value="3">工程与环境</option>
                    <option value="4">政府公共管理</option>
                    <option value="5">医疗与健康</option>
                    <option value="6">教育与个人服务</option>
                    <option value="7">商业行政</option>
                    <option value="8">广告与设计</option>
                    <option value="9">酒店、餐饮与旅游</option>
                    <option value="10">运输物流</option>
                    <option value="11">房地产服务</option>
                    <option value="12">进出口贸易与零售</option>
                    <option value="13">社会服务</option>
                </select>
            </div>
        </div>

        <button type="submit" class="submit-btn">提交测评，生成我的职场基因报告</button>
    </form>

    <footer>
        &copy; 2026 Santa Chow 香港求职咨询
    </footer>
</div>

<!-- ==================== REPORT PAGE ==================== -->
<div class="container" id="reportPage">
    <header class="report-header">
        <h1>职场禀赋扫描报告</h1>
        <div class="report-meta">
            <span id="rptName"></span> &nbsp;|&nbsp; <span id="rptSchool"></span> &nbsp;|&nbsp; <span id="rptIndustry"></span> &nbsp;|&nbsp; <span id="rptDate"></span>
        </div>
    </header>

    <!-- Radar Chart -->
    <div class="report-section">
        <div class="report-section-title">八维能力全景图</div>
        <div class="radar-wrap">
            <canvas id="radarChart" width="480" height="480"></canvas>
        </div>
    </div>

    <!-- Dimension Scores -->
    <div class="report-section">
        <div class="report-section-title">各维度得分详情</div>
        <div class="dim-grid" id="dimGrid"></div>
    </div>

    <!-- Strengths & Growth -->
    <div class="report-section">
        <div class="report-section-title">核心发现</div>
        <div class="analysis-grid">
            <div class="analysis-box strength" id="strengthBox">
                <h4>&#x2705; 核心优势</h4>
                <div id="strengthList"></div>
            </div>
            <div class="analysis-box growth" id="growthBox">
                <h4>&#x1f7e1; 成长空间</h4>
                <div id="growthList"></div>
            </div>
        </div>
    </div>

    <!-- Industry Match -->
    <div class="report-section">
        <div class="report-section-title">行业适配分析</div>
        <div class="industry-match-box" id="industryBox"></div>
    </div>

    <!-- Summary -->
    <div class="report-section">
        <div class="report-section-title">综合评语</div>
        <div class="summary-box" id="summaryBox"></div>
    </div>

    <div class="report-actions">
        <button class="print-btn" onclick="exportPDF()">&#x1f5a8; 导出PDF</button>
        <button class="print-btn" onclick="exportPNG()" style="background:#10b981;">&#x1f5bc; 导出PNG图片</button>
        <button class="back-btn" onclick="goBack()">&#x21a9; 返回问卷</button>
    </div>

    <footer>
        &copy; 2026 Santa Chow 香港求职咨询
    </footer>
</div>

<script>
// ===================== DATA =====================

const questions = [
    "在处理多项紧急任务并发时，我能果断放弃那些价值较低的「琐事」。",
    "我习惯对失败的案例进行深度复盘，并将其固化为自己的一条具体行为准则。",
    "即使在无人监督的环境下，我依然能维持与在办公室同等甚至更高密度的产出。",
    "我热衷于钻研科学理论、分析数据或探索事物的内在规律。",
    "讨论问题时，我倾向于建立系统模型来分析影响因素，并能指出他人思维中的逻辑谬误。",
    "我能精准听出对方话语中隐含的真实意图或尚未表达的担忧。",
    "在任务启动前，我会预估潜在的阻力并预留缓冲时间，确保计划具备抗风险性。",
    "我从未曾在背后说过任何人的坏话，对所有人始终保持绝对的真诚。",
    "我渴望帮助他人解决问题、进行教学或在团队中提供情感支持。",
    "当我发现现有技能无法应对新挑战时，我会立刻寻找高质量的学习资源进行补强。",
    "面对负面反馈或职场挫败，我能迅速抽离个人情绪，将其视为价值极高的升级指南。",
    "任务交付后，我会主动分析执行过程中的偏差，并作为未来的管理参考。",
    "我喜欢亲自动手操作机械设备或修复具体的实体物件。",
    "遇到复杂问题时，我能通过「剥洋葱」的方式逐层过滤噪音，锁定最核心的症结。",
    "面对含糊的指令，我能通过反向提问迅速对齐需求，避免返工。",
    "在海量并发任务中，我能根据公司的长期目标迅速判断出真正的「第一优先级」。",
    "我偏好有序的环境下处理文字档案、整理数据或执行标准程序。",
    "我会主动追踪技术趋势，并思考如何将新技术应用到现有的枯燥流程中。",
    "进入一个完全陌生的专业领域，我通常能在极短时间内掌握其底层框架并开始处理业务。",
    "在陌生社交场合，我能迅速找到切入点与关键决策者建立联系，而非仅限于寒暄。",
    "面对长达数十页且信息散乱的报告，我能迅速萃取出对决策至关重要的关键点。",
    "我能精确计算出每项任务所需的人力与时间成本，并根据资源余量进行调度。",
    "遇到软硬件或系统逻辑错误时，我习惯先根据报错信息自主排查根源。",
    "我撰写的邮件或报告通常只需一屏即可说明核心问题，且接收方无需二次询问。",
    "面对极其有限的时间和预算，我能通过灵活置换或优化顺序来达成核心目标。",
    "任务授权后，我会建立关键节点检查站，确保在不微观管理的情况下完全掌握进度。",
    "我习惯在策划初期就同步构思两套完全不同的执行路径，以备不时之需。",
    "面对激进的律词或攻击性言论，我能剥离情绪，引导对话回到建设性的任务讨论。",
    "我每周会固定划出时间专研行业前沿知识，以确保自己的认知不被时代迭代。",
    "我热衷于拆解新工具的逻辑，通常无需说明书就能掌握其高级功能。",
    "我热衷于文学艺术、创意设计或透过不拘一格的方式表达自我。",
    "汇报工作时，我能用一句话总结进展，并在三点之内陈述清楚逻辑。",
    "对于已经运作多年的陈旧流程，我常能提出跨维度的改进方案，显著提升产出。",
    "当团队切换到全新的协作平台时，我通常是第一批适应并制定使用规范的人。",
    "面对逻辑断层的突发状况，我能本能地推导出事物间的因果关系。",
    "面对从未遇到的「黑天鹅」难题，我能跳出思维框架，提出有效的新路径。",
    "我喜欢领导团队达成目标、参与商务谈判或说服他人接受观点。",
    "面对不合理的期限要求，我能用数据说明风险，并主动与上级重新对齐范围。",
    "在承接任务时，我会先与相关方明确「成功」的具体指标，防止后期纠纷。",
    "一旦主方案遇到不可抗力，我通常能在极短时间内启动预先想好的备选策略。",

// ===================== FORM SUBMIT =====================

document.getElementById('assessmentForm').onsubmit = function(e) {
    e.preventDefault();

    // Collect answers
    const answers = {};
    let allAnswered = true;
    for (let i = 1; i <= questions.length; i++) {
        const sel = document.querySelector(`input[name="q${i}"]:checked`);
        if (!sel) { allAnswered = false; break; }
        answers[i] = parseInt(sel.value);
    }

    if (!allAnswered) {
        alert('请完成所有题目后再提交！');
        return;
    }

    const userName = document.querySelector('input[name="userName"]').value.trim();
    const userSchool = document.querySelector('input[name="userSchool"]').value.trim();
    const targetIndustry = document.querySelector('select[name="targetIndustry"]').value;

    // Disable submit button
    const submitBtn = document.querySelector('.submit-btn');
    submitBtn.disabled = true;
    submitBtn.textContent = '正在提交...';

    // Submit to backend API
    fetch('/api/quiz/submit_55', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            answers: answers,
            name: userName,
            school: userSchool,
            targetIndustry: targetIndustry
        })
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            // Generate report on webpage
            generateReport(userName, userSchool, targetIndustry, data.scores, data.overall_avg);
            // Show report page, hide quiz form
            document.getElementById('quizPage').style.display = 'none';
            document.getElementById('reportPage').style.display = 'block';
            // Scroll to top
            window.scrollTo(0, 0);
        } else {
            alert('提交失败：' + (data.error || '未知错误'));
            submitBtn.disabled = false;
            submitBtn.textContent = '提交测评，生成我的职场基因报告';
        }
    })
    .catch(err => {
        alert('提交失败，请检查网络连接：' + err.message);
        submitBtn.disabled = false;
        submitBtn.textContent = '提交测评，生成我的职场基因报告';
    });
};

function getLevel(score) {
    if (score >= 4.1) return { text:'优秀水平', cls:'excellent' };
    if (score >= 3.1) return { text:'熟练水平', cls:'proficient' };
    if (score >= 2.1) return { text:'基础水平', cls:'foundational' };
    return { text:'发展中', cls:'developing' };
}

function getLevelColor(score) {
    if (score >= 4.1) return '#10b981';
    if (score >= 3.1) return '#3b82f6';
    if (score >= 2.1) return '#f59e0b';
    return '#ef4444';
}

// ===================== RADAR CHART =====================

function drawRadar(dimAvg) {
    const canvas = document.getElementById('radarChart');
    const ctx = canvas.getContext('2d');
    const W = canvas.width;
    const H = canvas.height;
    const cx = W / 2;
    const cy = H / 2;
    const R = Math.min(W, H) / 2 - 60;
    const N = DIM_KEYS.length;
    const angleStep = (2 * Math.PI) / N;
    const startAngle = -Math.PI / 2; // start from top

    ctx.clearRect(0, 0, W, H);

    // Draw grid rings (1-5)
    for (let ring = 1; ring <= 5; ring++) {
        const r = (ring / 5) * R;
        ctx.beginPath();
        for (let i = 0; i <= N; i++) {
            const angle = startAngle + i * angleStep;
            const x = cx + r * Math.cos(angle);
            const y = cy + r * Math.sin(angle);
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.strokeStyle = ring === 5 ? '#ccc' : '#e9ecef';
        ctx.lineWidth = ring === 5 ? 1.5 : 1;
        ctx.stroke();

        // Ring label
        if (ring % 2 === 0 || ring === 5) {
            ctx.fillStyle = '#aaa';
            ctx.font = '9px sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText(ring.toString(), cx + 4, cy - r + 3);
        }
    }

    // Draw axis lines
    for (let i = 0; i < N; i++) {
        const angle = startAngle + i * angleStep;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + R * Math.cos(angle), cy + R * Math.sin(angle));
        ctx.strokeStyle = '#ddd';
        ctx.lineWidth = 1;
        ctx.stroke();
    }

    // Draw filled polygon (scores)
    ctx.beginPath();
    for (let i = 0; i <= N; i++) {
        const idx = i % N;
        const angle = startAngle + idx * angleStep;
        const r = (dimAvg[DIM_KEYS[idx]] / 5) * R;
        const x = cx + r * Math.cos(angle);
        const y = cy + r * Math.sin(angle);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fillStyle = 'rgba(52, 152, 219, 0.2)';
    ctx.fill();
    ctx.strokeStyle = '#3498db';
    ctx.lineWidth = 2.5;
    ctx.stroke();

    // Draw score dots and labels
    for (let i = 0; i < N; i++) {
        const key = DIM_KEYS[i];
        const angle = startAngle + i * angleStep;
        const r = (dimAvg[key] / 5) * R;
        const x = cx + r * Math.cos(angle);
        const y = cy + r * Math.sin(angle);

        // Dot
        ctx.beginPath();
        ctx.arc(x, y, 5, 0, 2 * Math.PI);
        ctx.fillStyle = DIM_META[key].color;
        ctx.fill();
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Label
        const labelR = R + 30;
        const lx = cx + labelR * Math.cos(angle);
        const ly = cy + labelR * Math.sin(angle);
        ctx.fillStyle = DIM_META[key].color;
        ctx.font = 'bold 11px "PingFang HK", "Microsoft JhengHei", sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(DIM_META[key].name, lx, ly);

        // Score
        const scoreLy = ly + 16;
        ctx.fillStyle = '#666';
        ctx.font = '10px sans-serif';
        ctx.fillText(dimAvg[key].toFixed(1), lx, scoreLy);
    }
}

// ===================== NAVIGATION =====================

function goBack() {
    document.getElementById('reportPage').style.display = 'none';
    document.getElementById('quizPage').style.display = 'block';
    window.scrollTo(0, 0);
}

// ===================== EXPORT FUNCTIONS =====================

function exportPDF() {
    window.print();
}

function exportPNG() {
    const reportElement = document.getElementById('reportPage');
    const exportBtn = document.querySelector('.report-actions');
    exportBtn.style.display = 'none'; // Hide buttons in PNG
    
    html2canvas(reportElement, {
        scale: 2,
        useCORS: true,
        backgroundColor: '#ffffff'
    }).then(canvas => {
        exportBtn.style.display = 'flex'; // Restore buttons
        const link = document.createElement('a');
        link.download = `职场禀赋报告_${document.getElementById('rptName').textContent}_${new Date().getTime()}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
    }).catch(err => {
        exportBtn.style.display = 'flex';
        alert('导出PNG失败：' + err.message);
    });
}
