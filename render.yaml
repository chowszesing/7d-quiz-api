# Render Blueprint - 8维能力测评一体化服务 (48题版)
# 字体持久化：fonts/NotoSansSC-Regular.otf 提交到 GitHub，构建时直接可用
services:
  - type: web
    name: 7d-quiz-api
    env: python
    region: singapore
    buildCommand: |
      fc-cache -fv 2>/dev/null || true
      pip install -r requirements.txt
    startCommand: |
      fc-cache -fv 2>/dev/null || true
      gunicorn quiz_api_server:app -b 0.0.0.0:$PORT -w 1 --timeout 120
    healthCheckPath: /api/health
    plan: free
    autoDeploy: true
    envVars:
      - key: DATABASE
        value: quiz_results.db
      - key: PORT
        value: "5000"
      - key: PYTHON_VERSION
        value: "3.11"
