[build]
  buildCommand = "pip install --no-cache-dir -r requirements.txt && PLAYWRIGHT_BROWSERS_PATH=/app/pw-browsers playwright install --with-deps chromium && echo '[build] Playwright Chromium installed to /app/pw-browsers'"

[env]
  PYTHONDONTWRITEBYTECODE = "1"
  PIP_NO_CACHE_DIR = "1"
  PYTHONUNBUFFERED = "1"
  PLAYWRIGHT_BROWSERS_PATH = "/app/pw-browsers"
