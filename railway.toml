[build]
  builder = "NIXPACKS"
  buildCommand = "pip install --no-cache-dir -r requirements.txt && playwright install chromium"

[deploy]
  startCommand = "gunicorn -b 0.0.0.0:$PORT -w 4 quiz_api_server:app"
  healthcheckPath = "/api/health"
  healthcheckTimeout = 30
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 3

[env]
  PYTHONDONTWRITEBYTECODE = "1"
  PIP_NO_CACHE_DIR = "1"
  PYTHONUNBUFFERED = "1"
