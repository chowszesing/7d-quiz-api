[build]
  builder = "NIXPACKS"
  buildCommand = "pip install --no-cache-dir -r requirements.txt && playwright install chromium && playwright install-deps chromium && apt-get update && apt-get install -y fonts-noto-cjk || true"

[deploy]
  startCommand = "gunicorn quiz_api_server:app -b 0.0.0.0:$PORT -w 4"
  healthcheckPath = "/api/health"
  healthcheckTimeout = 30
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 3

[env]
  PYTHONDONTWRITEBYTECODE = "1"
  PIP_NO_CACHE_DIR = "1"
  PYTHONUNBUFFERED = "1"
