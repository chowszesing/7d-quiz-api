[build]
  buildCommand = "pip install --no-cache-dir -r requirements.txt && playwright install chromium"

[deploy]
  startCommand = "/opt/venv/bin/gunicorn -b 0.0.0.0:$PORT -w 4 quiz_api_server:app"
  healthcheckPath = "/api/health"
  healthcheckTimeout = 30
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 3

[env]
  PATH = "/opt/venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  PYTHONDONTWRITEBYTECODE = "1"
  PIP_NO_CACHE_DIR = "1"
  PYTHONUNBUFFERED = "1"
