[build]
  buildCommand = "apt-get update && apt-get install -y --no-install-recommends fonts-wqy-microhei fonts-noto-cjk && pip install --no-cache-dir -r requirements.txt && playwright install chromium && playwright install-deps chromium"

[env]
  PYTHONDONTWRITEBYTECODE = "1"
  PIP_NO_CACHE_DIR = "1"
  PYTHONUNBUFFERED = "1"
